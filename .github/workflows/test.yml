name: Unit Tests

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:  # 允许手动触发

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
      fail-fast: false  # 一个版本失败不影响其他版本

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'  # 缓存pip依赖加速构建

    - name: 显示Python版本
      run: python --version

    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: 运行单元测试
      env:
        FS_APP_ID: ${{ secrets.FS_APP_ID }}
        FS_APP_SECRET: ${{ secrets.FS_APP_SECRET }}
      run: |
        pytest tests/unit -v -m unit --cov=fastfeishu --cov-report=term-missing --cov-report=xml

    - name: 上传覆盖率报告
      uses: codecov/codecov-action@v4
      if: matrix.python-version == '3.11'  # 只上传一次
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
      continue-on-error: true  # 覆盖率上传失败不影响测试结果
