[pytest]
# Pytest configuration file

# 测试目录
testpaths = tests

# 测试文件匹配模式
python_files = test_*.py *_test.py

# 测试类匹配模式
python_classes = Test*

# 测试函数匹配模式
python_functions = test_*

# 输出选项
addopts =
    # 显示详细信息
    -v
    # 显示每个测试的输出
    -s
    # 显示本地变量
    -l
    # 显示测试覆盖率
    --cov=fastfeishu
    # 覆盖率报告类型
    --cov-report=html
    --cov-report=term-missing
    # 失败时的调试信息
    --tb=short
    # 警告设置
    -W ignore::DeprecationWarning

# 标记定义
markers =
    unit: 单元测试（不依赖外部服务）
    integration: 集成测试（需要真实的Feishu API）
    slow: 慢速测试（执行时间较长）
    smoke: 冒烟测试（快速验证基本功能）

# 覆盖率配置
[coverage:run]
omit =
    */tests/*
    */test_*.py
    */__init__.py
    */configs/*
    setup.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
